file: project_blueprint
functions:
- name: login
  parameters:
  - name: username
    type: string
  - name: password
    type: string
  return_type: '["access_token", "refresh_token"]'
  description: Handles user login and returns access and refresh tokens for secure
    authentication.
- name: refreshTokens
  parameters:
  - name: refresh_token
    type: string
  return_type: '["new access_token", "new refresh_token"]'
  description: Refreshes the access and refresh tokens upon user request or expiration.
- name: getProducts
  parameters: []
  return_type: '[object]'
  description: Retrieves a list of all available baked goods in the shop's catalog.
- name: createOrder
  parameters:
  - name: order_details
    type: '["customer", "products", "delivery information"]'
  return_type: string
  description: Creates a new order based on provided details and saves it in the database.
- name: trackOrder
  parameters:
  - name: order_id
    type: string
  return_type: '["order status updates", e.g., "picked up", "in transit", "delivered"]'
  description: Retrieves current order status based on its unique identifier.
