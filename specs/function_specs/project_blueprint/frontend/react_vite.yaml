file: project_blueprint/frontend/react_vite
functions:
- name: initReactApp
  parameters:
  - name: projectName
    type: string
  - name: template
    type: string
  return_type: string
  description: Creates a new React project using the selected template and initializes
    it with Vite and TypeScript.
- name: buildFrontend
  parameters:
  - name: productionMode
    type: boolean
  return_type: string
  description: Compiles the source code of the React application using Vite, optionally
    in production mode to optimize output.
