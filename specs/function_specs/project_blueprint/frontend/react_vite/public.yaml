file: project_blueprint/frontend/react_vite/public/serve-static.js
functions:
- name: serveStaticFile
  parameters:
  - name: filePath
    type: string
  - name: rootDir
    type: string
  return_type: StaticFileResponse
  description: Retrieves a static file from the given file path within the rootDir
    and serves it as a response.
- name: serveIndexFile
  parameters:
  - name: indexFileName
    type: string
  - name: rootDir
    type: string
  return_type: IndexFileResponse
  description: Serves an index file specified by indexFileName located within the
    given rootDir. If no index file is found, it serves a default one (e.g., index.html).
