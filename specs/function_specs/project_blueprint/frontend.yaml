file: project_blueprint/frontend/utils.js
functions:
- name: addFrontendTemplate
  parameters:
  - name: technologyName
    type: string
  return_type: string
  description: Responsible for creating a new subfolder within the project_blueprint/frontend
    containing all necessary files and configurations for a given frontend technology.
- name: removeFrontendTemplate
  parameters:
  - name: technologyName
    type: string
  return_type: string
  description: Deletes a given frontend template subfolder, if needed, from within
    the project_blueprint/frontend folder.
- name: updateFrontendTemplate
  parameters:
  - name: technologyName
    type: string
  - name: newVersionOrUpdateDetails
    type: object
  return_type: string
  description: Updates an existing subfolder within the project_blueprint/frontend
    folder to reflect the latest version or changes in a given frontend technology.
